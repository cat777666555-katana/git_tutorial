<!DOCTYPE html>
<html>
<head>
  <script>
    /* 初期ダークモード（チラつき防止） */
    (function() {
      const mode = localStorage.getItem("theme");
      if (mode === "dark") {
        document.documentElement.classList.add("dark");
      }
    })();
  </script>

  <meta charset="utf-8">
  <title>$title$</title>
  <link rel="stylesheet" href="$css$">
  <script src="search.js"></script>
</head>

<body>

<!-- ★★★ ここから全体 Zoom 対象 ★★★ -->
<div id="zoom-wrapper">

  <!-- サイドバー -->
  <div id="sidebar">
    <div id="sidebar-header">
      <input type="text" id="searchBox" placeholder="検索...">
      <button id="toggleDark">🌙</button>
    </div>

    <div id="nav">
      $include-before$
    </div>

    <div id="sidebar-resizer"></div>
  </div>

  <!-- 本文 -->
  <div id="content">
    $body$
  </div>

  <!-- Zoom スライダー -->
  <footer id="footerZoom">
    <label for="zoomSlider">Zoom:</label>
    <input type="range" id="zoomSlider" min="50" max="200" value="100">
  </footer>

</div>
<!-- ★★★ Zoom 対象ここまで ★★★ -->


<script>
/* ------------------------------
   ダークモード切り替え
------------------------------ */
function setupDarkMode() {
  const btn = document.getElementById("toggleDark");
  btn.addEventListener("click", () => {
    document.documentElement.classList.toggle("dark");
    localStorage.setItem("theme",
      document.documentElement.classList.contains("dark") ? "dark" : "light"
    );
  });
}

/* ------------------------------
   サイドバー幅保持
------------------------------ */
function setupSidebarResize() {
  const sidebar = document.getElementById("sidebar");
  const resizer = document.getElementById("sidebar-resizer");

  const savedWidth = localStorage.getItem("sidebarWidth");
  if (savedWidth) {
    sidebar.style.width = savedWidth + "px";
    document.getElementById("content").style.marginLeft =
      (parseInt(savedWidth) + 20) + "px";
  }

  let dragging = false;

  resizer.addEventListener("mousedown", () => dragging = true);
  document.addEventListener("mouseup", () => dragging = false);

  document.addEventListener("mousemove", e => {
    if (!dragging) return;

    const newWidth = Math.max(200, Math.min(500, e.clientX));
    sidebar.style.width = newWidth + "px";
    document.getElementById("content").style.marginLeft =
      (newWidth + 20) + "px";

    localStorage.setItem("sidebarWidth", newWidth);
  });
}

/* ------------------------------
   ズーム保持
------------------------------ */
function setupZoom() {
  const savedZoom = localStorage.getItem("zoomLevel");
  if (savedZoom) {
    document.body.style.zoom = savedZoom;
  }
}

function setZoom(level) {
  document.body.style.zoom = level;
  localStorage.setItem("zoomLevel", level);
}

/* ------------------------------
   折りたたみツリー
------------------------------ */
function setupTree() {
  document.querySelectorAll("#nav li").forEach(li => {
    const sub = li.querySelector("ul");
    const link = li.querySelector("a");

    if (sub) {
      const toggle = document.createElement("span");
      toggle.className = "toggle";
      li.insertBefore(toggle, li.firstChild);

      li.classList.add("folder");

      toggle.addEventListener("click", () => {
        li.classList.toggle("open");
        sub.style.display = li.classList.contains("open") ? "block" : "none";
      });

      sub.style.display = "none";
    } else if (link) {
      li.classList.add("file");
    }
  });
}

/* ------------------------------
   現在ページハイライト
------------------------------ */
function highlightCurrentPage() {
  const current = location.pathname.split("/").pop();
  document.querySelectorAll("#nav a").forEach(a => {
    if (a.getAttribute("href") === current) {
      a.classList.add("current-page");
      let parent = a.parentElement;
      while (parent && parent.id !== "nav") {
        if (parent.tagName === "LI") {
          parent.classList.add("open");
          const sub = parent.querySelector("ul");
          if (sub) sub.style.display = "block";
        }
        parent = parent.parentElement;
      }
    }
  });
}

/* ------------------------------
   全体 Zoom（NAV も含む）
------------------------------ */
function setupZoomSlider() {
  const slider = document.getElementById("zoomSlider");

  // 初期復元
  const savedZoom = localStorage.getItem("zoomLevel");
  if (savedZoom) {
    document.body.style.zoom = savedZoom + "%";
  slider.value = savedZoom;
  }

  slider.addEventListener("input", () => {
    const level = slider.value;
    document.body.style.zoom = level + "%";
    localStorage.setItem("zoomLevel", level);
  });
}

/* ------------------------------
   初期化
------------------------------ */
document.addEventListener("DOMContentLoaded", () => {
  setupTree();
  highlightCurrentPage();
  setupSearch();
  setupSidebarResize();
  setupDarkMode();
  setupZoom();
  setupZoomSlider();
});
</script>

</body>
</html>
